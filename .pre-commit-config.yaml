repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy app/ tests/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-check
        name: pytest (unit + e2e)
        entry: uv run pytest tests/unit tests/e2e -x -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
