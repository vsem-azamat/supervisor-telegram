services:
  mcp-server:
    build:
      context: .
      target: development
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: uv run fastmcp run app/mcp_server/main.py:mcp --transport streamable-http --host 0.0.0.0 --port 8000
    networks:
      - app-network
    volumes:
      - ./app:/app/app

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://mcp-server:8000
    networks:
      - app-network
    depends_on:
      - mcp-server

networks:
  app-network:
    external: true
