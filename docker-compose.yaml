# Production Docker Compose configuration
# Use with docker-compose.override.yml for development
services:
  bot:
    build:
      context: .
      target: production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: >
      sh -c "
      ./scripts/wait_for_postgres.sh &&
      uv run alembic upgrade head &&
      uv run python -m app.presentation.telegram
      "
    networks:
      - app-network

  api:
    build:
      context: .
      target: production
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: >
      sh -c "
      ./scripts/wait_for_postgres.sh &&
      uv run uvicorn app.presentation.api.main:app --host 0.0.0.0 --port 8000
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  webapp:
    build:
      context: ./webapp
      target: production
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webapp
      - api
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:17.6
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - moderator-bot-db:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  moderator-bot-db:

networks:
  app-network:
    driver: bridge
