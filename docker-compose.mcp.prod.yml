services:
  mcp-server:
    build:
      context: .
      target: production
    env_file:
      - .env.prod
      - .env.prod-db
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    command: uv run fastmcp run app/mcp_server/main.py:mcp --transport streamable-http --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    ports:
      - "${MCP_PORT:-8001}:8000"
    networks:
      - app-network

networks:
  app-network:
    external: true
