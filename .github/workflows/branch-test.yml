name: Branch Tests

on:
  push:
    branches-ignore: [ main ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: branch-tests-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  mode:
    runs-on: ubuntu-latest
    outputs:
      run_heavy_tests: ${{ steps.branch.outputs.run_heavy_tests }}
    steps:
      - id: branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          encoded_head=$(jq -rn \
            --arg value "$GITHUB_REPOSITORY_OWNER:$GITHUB_REF_NAME" \
            '$value|@uri')
          open_pr_count=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls?state=open&base=main&head=$encoded_head" \
            | jq 'length')

          if [ "$open_pr_count" -eq 0 ]; then
            echo "run_heavy_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy_tests=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: mode
    if: needs.mode.outputs.run_heavy_tests == 'true'
    uses: ./.github/workflows/test.yml
