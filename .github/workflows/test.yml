name: Tests

on:
  workflow_call:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_moderator_bot
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_moderator_bot
      DB_HOST: localhost
      DB_PORT: 5432
      MODERATOR_BOT_TOKEN: "test_token"
      ADMIN_SUPER_ADMINS: "123456789"

    # Matrix kept (even though single-versioned) so the required-status-check
    # rule `test (3.12)` keeps matching.
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "0.11.11"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies
      run: uv sync --dev

    - name: Lint + format check (ruff)
      run: |
        uv run ruff check app tests
        uv run ruff format --check app tests

    - name: Type check (ty)
      run: uv run ty check app tests

    # Single pytest invocation covering all suites with coverage. Pytest
    # auto-discovers from testpaths=["tests"] (unit + integration + e2e +
    # handlers + middleware + performance). Previously each suite ran
    # separately AND the full run was repeated with --cov, duplicating
    # ~1.5 min of work.
    - name: Pytest with coverage
      run: uv run pytest --cov=app --cov-report=xml --cov-report=html --cov-fail-under=55

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6.0.0
      if: success()
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage reports as artifact
      uses: actions/upload-artifact@v7.0.1
      if: always()
      with:
        name: coverage-reports
        path: htmlcov/

    - name: Set up Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: "24.15.0"

    - name: Set up pnpm
      run: |
        corepack enable
        corepack prepare pnpm@10.33.0 --activate

    - name: Install webui dependencies
      run: pnpm --dir webui install --frozen-lockfile

    - name: Check webui
      run: pnpm --dir webui run check

    - name: Build webui
      run: pnpm --dir webui run build

    - name: Install Playwright browsers
      run: pnpm --dir webui exec playwright install --with-deps chromium

    - name: Test webui e2e
      run: pnpm --dir webui run test:e2e
