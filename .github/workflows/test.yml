name: Tests

on:
  workflow_call:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore: [ main ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  mode:
    runs-on: ubuntu-latest
    outputs:
      run_heavy_tests: ${{ steps.branch.outputs.run_heavy_tests }}
    steps:
      - id: branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_EVENT_NAME" != "push" ]; then
            echo "run_heavy_tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          encoded_head=$(jq -rn \
            --arg value "$GITHUB_REPOSITORY_OWNER:$GITHUB_REF_NAME" \
            '$value|@uri')
          open_pr_count=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls?state=open&base=main&head=$encoded_head" \
            | jq 'length')

          if [ "$open_pr_count" -eq 0 ]; then
            echo "run_heavy_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy_tests=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: mode
    if: needs.mode.outputs.run_heavy_tests == 'true'
    name: ${{ github.event_name == 'push' && format('branch test ({0})', matrix.python-version) || format('test ({0})', matrix.python-version) }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_moderator_bot
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_moderator_bot
      DB_HOST: localhost
      DB_PORT: 5432
      MODERATOR_BOT_TOKEN: "test_token"
      ADMIN_SUPER_ADMINS: "123456789"

    # Matrix kept (even though single-versioned) so the required-status-check
    # rule `test (3.12)` keeps matching.
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.11.11"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies
      run: uv sync --dev

    - name: Lint + format check (ruff)
      run: |
        uv run ruff check app tests
        uv run ruff format --check app tests

    - name: Type check (ty)
      run: uv run ty check app tests

    # Single pytest invocation covering all suites with coverage. Pytest
    # auto-discovers from testpaths=["tests"] (unit + integration + e2e +
    # handlers + middleware + performance). Previously each suite ran
    # separately AND the full run was repeated with --cov, duplicating
    # ~1.5 min of work.
    - name: Pytest with coverage
      run: uv run pytest --cov=app --cov-report=xml --cov-report=html --cov-fail-under=55

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: success()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage reports as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: htmlcov/

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24.15.0"

    - name: Set up pnpm
      run: |
        corepack enable
        corepack prepare pnpm@10.33.0 --activate

    - name: Install webui dependencies
      run: pnpm --dir webui install --frozen-lockfile

    - name: Check webui
      run: pnpm --dir webui run check

    - name: Build webui
      run: pnpm --dir webui run build
