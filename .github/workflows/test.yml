name: Tests

on:
  workflow_call:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_moderator_bot
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_moderator_bot
      DB_HOST: localhost
      DB_PORT: 5432
      MODERATOR_BOT_TOKEN: "test_token"
      ADMIN_SUPER_ADMINS: "123456789"

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Run linting with ruff
      run: |
        uv run ruff check app tests

    - name: Run formatting check with ruff
      run: |
        uv run ruff format --check app tests

    - name: Run type checking with ty
      run: |
        uv run ty check app tests

    - name: Run unit tests
      run: |
        uv run pytest tests/unit -v --tb=short

    - name: Run integration tests
      run: |
        uv run pytest tests/integration -v --tb=short

    - name: Run end-to-end tests
      run: |
        uv run pytest tests/e2e -v --tb=short

    - name: Run tests with coverage
      run: |
        uv run pytest --cov=app --cov-report=xml --cov-report=html --cov-fail-under=55

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: success()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage reports as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: htmlcov/

  performance-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_moderator_bot_perf
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_moderator_bot_perf
      DB_HOST: localhost
      DB_PORT: 5432
      MODERATOR_BOT_TOKEN: "test_token"
      ADMIN_SUPER_ADMINS: "123456789"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Run performance tests
      run: |
        uv run pytest tests/performance -v --tb=short -m "performance and not slow"

    - name: Run slow performance tests
      run: |
        uv run pytest tests/performance -v --tb=short -m "slow"
      continue-on-error: true
