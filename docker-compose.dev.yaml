services:
  bot:
    build:
      context: .
      target: development
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "
      uv run alembic upgrade head &&
      uv run watchfiles 'uv run -m app.presentation.telegram' app/
      "
