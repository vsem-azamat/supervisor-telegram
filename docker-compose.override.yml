# Development overrides
services:
  bot:
    build:
      target: development
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PATH=/app/.venv/bin:/usr/local/bin:/usr/bin:/bin
      - UV_LINK_MODE=copy
    command: uv run watchfiles 'uv run -m app.presentation.telegram' app/ --ignore-paths '*.pyc,__pycache__,.git,app/presentation/api'

  api:
    build:
      target: development
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PATH=/app/.venv/bin:/usr/local/bin:/usr/bin:/bin
      - UV_LINK_MODE=copy
    command: uv run uvicorn app.presentation.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_PORT:-8000}:8000"

  webapp:
    build:
      target: development
    volumes:
      - ./webapp:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  nginx:
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
      - "--log=stdout"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    networks:
      - app-network
