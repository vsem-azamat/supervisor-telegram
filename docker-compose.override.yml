# Development overrides for docker-compose.yaml
# This file is automatically used by docker-compose
# Use docker-compose -f docker-compose.yaml up to skip development overrides

services:
  bot:
    build:
      target: development
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PATH=/app/.venv/bin:/usr/local/bin:/usr/bin:/bin
      - UV_LINK_MODE=copy
    command: >
      sh -c "
      if [ \"$SKIP_MIGRATIONS\" = \"true\" ]; then
        echo '⚠️  Skipping migrations (SKIP_MIGRATIONS=true)';
      else
        uv run alembic upgrade head;
      fi &&
      uv run watchfiles 'uv run -m app.presentation.telegram' app/ --ignore-paths '*.pyc,__pycache__,.git,app/presentation/api'
      "

  api:
    build:
      target: development
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PATH=/app/.venv/bin:/usr/local/bin:/usr/bin:/bin
      - UV_LINK_MODE=copy
    command: >
      sh -c "
      ./scripts/wait_for_postgres.sh &&
      uv run uvicorn app.presentation.api.main:app --host 0.0.0.0 --port 8000 --reload
      "
    ports:
      - "${API_PORT:-8000}:8000"

  webapp:
    build:
      target: development
    volumes:
      - ./webapp:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  nginx:
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro

  db:
    ports:
      - "${DB_PORT:-5432}:5432"

  # Development-only services
  adminer:
    image: adminer:5.3.0
    restart: always
    env_file:
      - .env
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - db
    networks:
      - app-network

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
      - "--log=stdout"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"  # ngrok web UI
    depends_on:
      - nginx
    networks:
      - app-network
